name: Release binaries

# On a v* tag, compile standalone binaries for the major platforms and attach
# them to the GitHub release. No runtime needed by end users.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: linux-x64,   flag: bun-linux-x64 }
          - { name: linux-arm64, flag: bun-linux-arm64 }
          - { name: darwin-x64,  flag: bun-darwin-x64 }
          - { name: darwin-arm64, flag: bun-darwin-arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Build ${{ matrix.target.name }}
        run: |
          bun build ./dio-lookup.ts --compile --target=${{ matrix.target.flag }} \
            --outfile dio-lookup-${{ matrix.target.name }}
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: dio-lookup-${{ matrix.target.name }}
